        <section id="company-info" class="section">
            <div class="company-info-container">
                <div class="about-column-wrapper">
                    <div class="about-column company-details-box">
                        <p class="company-name-container" style="margin-bottom: 0.5rem;"><span data-i18n-accent-all data-i18n-key="contact_page.company_details.name"></span></p>
                        <p style="margin-bottom: 0.5rem;" data-i18n-accent-colon data-i18n-key="contact_page.company_details.reg_number"></p>
                        <p style="margin-bottom: 0.5rem;" data-i18n-accent-colon data-i18n-key="contact_page.company_details.cui"></p>

                    </div>
                </div>
            </div>
        </section>

        <section id="section5" class="section">
            <div class="contact-container">
                <form id="contact-form" action="https://api.web3forms.com/submit" method="POST"> 
                    <h2>
                        <span data-i18n-key="section5.get"></span>
                        <br>
                        <span data-i18n-accent-first data-i18n-key="section5.in_touch"></span>
                    </h2>

                    <input type="hidden" name="access_key" value="aa661a66-d337-4247-b2ec-39b5a690dd07">

                    <input name="name" type="text" class="feedback-input" data-i18n-placeholder="section5.form.name" required/>   
                    <input name="email" type="email" class="feedback-input" data-i18n-placeholder="section5.form.email" required/>
                    
                    <select name="project_type" id="project_type" class="feedback-input" required>
                        <option value="" disabled selected data-i18n-key="section5.form.project_type.label"></option>
                        <option value="startup" data-i18n-key="section5.form.project_type.startup"></option>
                        <option value="growth" data-i18n-key="section5.form.project_type.growth"></option>
                        <option value="enterprise" data-i18n-key="section5.form.project_type.enterprise"></option>
                        <option value="not_sure" data-i18n-key="section5.form.project_type.not_sure"></option>
                    </select>

                    <select name="timeline" class="feedback-input" required>
                        <option value="" disabled selected data-i18n-key="section5.form.timeline.label"></option>
                        <option value="immediate" data-i18n-key="section5.form.timeline.immediate"></option>
                        <option value="short" data-i18n-key="section5.form.timeline.short"></option>
                        <option value="planning" data-i18n-key="section5.form.timeline.planning"></option>
                    </select>

                    <textarea name="text" class="feedback-input" data-i18n-placeholder="section5.form.challenge" maxlength="300" required></textarea>
                    <input type="text" name="honeypot" style="display:none">
                    <button type="submit" class="submit-btn"><span data-i18n-key="section5.send"></span></button>
                </form>
                <div id="form-status"></div>
                <div class="contact-image">
                    <img loading="lazy" src="res/contact.png" alt="Formular de contact BOBER TECHNOLOGIES pentru consultanță software" class="contact-img">
                </div>
            </div>
        </section>
